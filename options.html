<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css" />
    <title>匯率換算設定</title>
  </head>
  <body
    class="bg-gray-50 text-gray-800 p-4 sm:p-8 flex justify-center items-start min-h-screen"
  >
    <div
      class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 max-w-4xl w-full space-y-6 my-4"
    >
      <h2
        class="text-xl font-bold text-gray-900 border-b pb-2 flex items-center gap-2"
      >
        ⚙️ 擴充功能設定
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-center">
        <div class="flex flex-col space-y-1.5">
          <label for="currencylist" class="text-sm font-medium text-gray-500"
            >預設幣別</label
          >
          <select
            id="currencylist"
            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500"
          >
            <option value="JPY">讀取中...</option>
          </select>
        </div>

        <div class="flex items-center gap-2 pt-6 sm:pt-4">
          <input
            type="checkbox"
            id="enable-comma"
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <label
            for="enable-comma"
            class="text-sm font-medium text-gray-700 select-none"
          >
            啟用金額千分位顯示 ( , )
          </label>
        </div>
      </div>

      <div class="mt-6 border-t pt-4">
        <h2 class="text-lg font-bold text-gray-800 mb-3">
          🔔 匯率到價通知管理
        </h2>

        <div
          class="bg-gray-50 p-4 rounded-xl border border-gray-200 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-3 items-end text-sm"
        >
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1"
              >追蹤幣別</label
            >
            <select
              id="track-currency"
              class="w-full bg-white border border-gray-200 rounded p-2 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none"
            ></select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1"
              >匯率類別</label
            >
            <select
              id="track-type"
              class="w-full bg-white border border-gray-200 rounded p-2 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none"
            >
              <option value="cashSell">現金賣出</option>
              <option value="spotSell">即期賣出</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1"
              >觸發條件</label
            >
            <select
              id="track-condition"
              class="w-full bg-white border border-gray-200 rounded p-2 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none"
            >
              <option value="lte">低於或等於 (≤)</option>
              <option value="gte">高於或等於 (≥)</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 font-medium mb-1"
              >目標價格</label
            >
            <input
              type="text"
              id="track-target"
              placeholder="如 0.215"
              class="w-full bg-white border border-gray-200 rounded p-2 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none"
            />
          </div>
          <div class="sm:col-span-2 md:col-span-1">
            <label class="block text-xs text-gray-500 font-medium mb-1"
              >達成後動作</label
            >
            <select
              id="track-action"
              class="w-full bg-white border border-gray-200 rounded p-2 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:outline-none"
            >
              <option value="pause">通知後暫停</option>
              <option value="delete">通知後刪除</option>
              <option value="continue">持續通知</option>
            </select>
          </div>
          <div class="col-span-1 sm:col-span-2 md:col-span-5 text-right mt-1">
            <button
              id="add-track-btn"
              class="bg-blue-600 text-white font-medium px-5 py-2 rounded-lg hover:bg-blue-700 active:scale-[0.98] transition-all shadow-sm w-full md:w-auto"
            >
              ➕ 新增追蹤項目
            </button>
          </div>
        </div>

        <div class="mt-4 overflow-x-auto border border-gray-100 rounded-xl">
          <table class="w-full text-left border-collapse text-sm min-w-162.5">
            <thead>
              <tr
                class="bg-gray-50 border-b border-gray-100 text-gray-500 font-medium"
              >
                <th class="p-3 pl-4 w-1/4">幣別</th>
                <th class="p-3">類別</th>
                <th class="p-3">條件</th>
                <th class="p-3 font-mono">目標價</th>
                <th class="p-3">處理機制</th>
                <th class="p-3 text-center w-24">狀態</th>
                <th class="p-3 text-center w-20">操作</th>
              </tr>
            </thead>
            <tbody
              id="track-list-body"
              class="divide-y divide-gray-100 text-gray-700"
            ></tbody>
          </table>
          <p id="no-track-tip" class="text-center text-gray-400 my-8 hidden">
            目前沒有任何進行中的追蹤項目。
          </p>
        </div>
      </div>

      <div class="flex gap-2 pt-2 border-t">
        <button
          id="save"
          class="w-full md:w-32 md:ml-auto bg-blue-500 text-white py-2.5 rounded-xl font-medium shadow-sm hover:bg-blue-600 active:scale-[0.98] transition-all"
        >
          儲存設定
        </button>
      </div>
    </div>

    <script type="module" src="./src/options.ts"></script>
  </body>
</html>
