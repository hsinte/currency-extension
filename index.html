<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="w-95 p-4 bg-gray-50 text-gray-800 selection:bg-blue-100">
    <div class="mb-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-center mb-3">
        <select
          id="view-currency"
          class="font-bold text-lg bg-transparent border-b-2 border-blue-500 focus:outline-none pb-0.5"
        >
          <option value="JPY">日圓 (JPY)</option>
          <option value="USD">美金 (USD)</option>
        </select>
        <div id="update-time" class="text-xs text-gray-400">
          更新時間：載入中...
        </div>
      </div>
      <div
        class="grid grid-cols-2 gap-4 text-center bg-gray-50 p-2.5 rounded-lg"
      >
        <div>
          <div class="text-xs text-gray-400 mb-1">現金賣出</div>
          <div id="cash-rate" class="font-bold text-xl text-blue-600">-</div>
        </div>
        <div>
          <div class="text-xs text-gray-400 mb-1">即期賣出</div>
          <div id="spot-rate" class="font-bold text-xl text-green-600">-</div>
        </div>
      </div>
    </div>

    <div
      class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-3 relative"
    >
      <div
        class="flex items-center space-x-2 bg-gray-50 p-2 rounded-lg border border-gray-100"
      >
        <input
          type="number"
          id="source-amount"
          class="w-full bg-transparent text-lg font-semibold focus:outline-none"
          placeholder="0"
        />
        <select
          id="source-currency"
          class="bg-white border border-gray-100 rounded px-2 py-1 font-medium shadow-sm focus:outline-none"
        ></select>
      </div>

      <div class="flex justify-center -my-2 relative z-10">
        <button
          id="btn-swap"
          class="bg-white border border-gray-100 p-1.5 rounded-full shadow-md hover:scale-105 transition-transform text-xs"
        >
          🔄
        </button>
      </div>

      <div
        class="flex items-center space-x-2 bg-gray-50 p-2 rounded-lg border border-gray-100"
      >
        <input
          type="number"
          id="target-amount"
          class="w-full bg-transparent text-lg font-semibold focus:outline-none"
          placeholder="0"
        />
        <select
          id="target-currency"
          class="bg-white border border-gray-100 rounded px-2 py-1 font-medium shadow-sm focus:outline-none"
        ></select>
      </div>
    </div>

    <button
      id="btn-toggle-chart"
      class="w-full mt-3 bg-blue-500 text-white py-2 rounded-xl font-medium shadow-sm hover:bg-blue-600 transition-colors"
    >
      顯示近30天趨勢圖
    </button>
    <div
      id="chart-container"
      class="hidden mt-3 h-48 bg-white p-2 rounded-xl shadow-sm border border-gray-100"
    >
      <canvas id="trend-chart"></canvas>
    </div>

    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
